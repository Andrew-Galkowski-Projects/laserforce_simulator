{% extends 'base.html' %}

{% block title %}{{ title }} - Laserforce Manager{% endblock %}

{% block content %}
<h1>{{ title }}</h1>

<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="{{ form.name.id_for_label }}" class="form-label">Team Name</label>
        {{ form.name }}
        {% if form.name.errors %}
            <div class="text-danger">{{ form.name.errors }}</div>
        {% endif %}
    </div>
    
    <button type="submit" class="btn btn-primary">Save Team</button>
    <a href="{% if team %}{% url 'team_detail' team.id %}{% else %}{% url 'team_list' %}{% endif %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}

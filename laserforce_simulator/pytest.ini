[pytest]
DJANGO_SETTINGS_MODULE = laserforce_simulator.settings
python_files = test_*.py *_test.py *tests.py
# Parallel execution (pytest-xdist). worksteal load-balances the long-tail
# simulation tests in test_batch_sim.py across workers - ~2x faster than serial.
# For a fast single-test / TDD loop, override with `-n0` to skip worker spawn:
#   pytest matches/tests/test_x.py::TestY::test_z -n0
addopts = -n auto --dist worksteal
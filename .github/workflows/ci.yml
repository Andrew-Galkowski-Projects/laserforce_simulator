name: CI

on:
  push:
    branches: [main, master, Nuke_bug, event_readability_updates]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: laserforce_test
          POSTGRES_USER: laserforce
          POSTGRES_PASSWORD: laserforce
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DJANGO_SETTINGS_MODULE: laserforce_simulator.settings
      SECRET_KEY: ${{ secrets.DJANGO_CI_SECRET_KEY || 'django-insecure-ci-only-not-a-real-secret' }}
      DEBUG: "True"
      DATABASE_URL: postgres://laserforce:laserforce@localhost:5432/laserforce_test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./laserforce_simulator/requirements.txt

      - name: Run migrations
        working-directory: ./laserforce_simulator
        run: |
          python manage.py migrate --noinput

      - name: Run tests with coverage
        working-directory: ./laserforce_simulator
        run: |
          pytest --cov=. --cov-report=xml:coverage.xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: coverage-report
          path: ./laserforce_simulator/coverage.xml # Updated path

name: CI

on:
  push:
    branches: [main, master, Nuke_bug, event_readability_updates]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: laserforce_test
          POSTGRES_USER: laserforce
          POSTGRES_PASSWORD: laserforce
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DJANGO_SETTINGS_MODULE: laserforce_simulator.settings
      SECRET_KEY: ${{ secrets.DJANGO_CI_SECRET_KEY || 'django-insecure-ci-only-not-a-real-secret' }}
      DEBUG: "True"
      DATABASE_URL: postgres://laserforce:laserforce@localhost:5432/laserforce_test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./laserforce_simulator/requirements.txt

      - name: Run migrations
        working-directory: ./laserforce_simulator
        run: |
          python manage.py migrate --noinput

      - name: Run tests with coverage
        working-directory: ./laserforce_simulator
        run: |
          pytest --cov=. --cov-report=xml:coverage.xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: coverage-report
          path: ./laserforce_simulator/coverage.xml # Updated path

  docker:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: laserforce_smoke
          POSTGRES_USER: laserforce
          POSTGRES_PASSWORD: laserforce
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t laserforce-simulator .

      - name: Smoke test
        run: |
          docker run -d --name smoke \
            --network host \
            -e SECRET_KEY=smoke-test-only-not-real \
            -e DEBUG=True \
            -e ALLOWED_HOSTS=localhost,127.0.0.1 \
            -e DATABASE_URL=postgres://laserforce:laserforce@localhost:5432/laserforce_smoke \
            laserforce-simulator
          trap 'docker stop smoke 2>/dev/null || true' EXIT
          ready=false
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:8000/; then
              echo "App is ready after ${i}s"
              ready=true
              break
            fi
            sleep 1
          done
          if [ "$ready" != "true" ]; then
            echo "App did not become ready after 30s"
            docker logs smoke
            exit 1
          fi
          curl -f -L http://localhost:8000/

      - name: Set up flyctl
        if: github.ref == 'refs/heads/main' && secrets.FLY_API_TOKEN != ''
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        if: github.ref == 'refs/heads/main' && secrets.FLY_API_TOKEN != ''
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

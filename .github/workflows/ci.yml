name: CI

on:
  push:
    branches: [main, master, Nuke_bug, event_readability_updates]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Django coverage
          # Add other packages your project needs

      - name: Run migrations
        working-directory: ./laserforce_simulator # Change this to where manage.py is located
        env:
          DJANGO_SETTINGS_MODULE: laserforce_simulator.settings
        run: |
          python manage.py migrate --noinput

      - name: Run tests with coverage
        working-directory: ./laserforce_simulator # Change this to where manage.py is located
        env:
          DJANGO_SETTINGS_MODULE: laserforce_simulator.settings
          DATABASE_URL: sqlite:///db.sqlite3 # or your test DB
        run: |
          coverage run --source='.' manage.py test --verbosity=2
          coverage xml -o coverage.xml

      - name: Upload coverage results
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml # May need to adjust path
